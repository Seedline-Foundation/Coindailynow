groups:
  - name: coindaily-backend
    rules:
      # ── API Response Time ────────────────────────────────
      - alert: HighApiLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="coindaily-backend"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 500ms"
          description: "95th percentile response time is {{ $value }}s (threshold: 500ms)"

      - alert: CriticalApiLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="coindaily-backend"}[5m])) > 2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "API p99 latency > 2s — requests being terminated"
          description: "99th percentile response time is {{ $value }}s"

      # ── Error Rate ───────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "5xx error rate > 5%"

      # ── Cache Hit Rate ──────────────────────────────────
      - alert: LowCacheHitRate
        expr: rate(cache_hits_total[10m]) / (rate(cache_hits_total[10m]) + rate(cache_misses_total[10m])) < 0.75
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate below 75% target"
          description: "Current cache hit rate: {{ $value | humanizePercentage }}"

  - name: coindaily-infra
    rules:
      # ── Host Resources ──────────────────────────────────
      - alert: HighCpuUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 85% for 10+ minutes"

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Memory usage > 90%"

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage > 85%"

  - name: coindaily-traffic-cop
    rules:
      - alert: HighIvtRate
        expr: coindaily_ivt_rate > 15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "IVT rate exceeds 15% — possible bot attack"

      - alert: ElevatedIvtRate
        expr: coindaily_ivt_rate > 8
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "IVT rate above 8% threshold"
