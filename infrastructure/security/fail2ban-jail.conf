# Fail2ban jail for jet.coindaily.online
# Add to /etc/fail2ban/jail.local

[coindaily-admin]
enabled = true
port = http,https
filter = coindaily-admin
logpath = /var/log/nginx/jet.coindaily.online.access.log
maxretry = 3
findtime = 600
bantime = 86400
action = iptables-multiport[name=coindaily-admin, port="http,https"]

[coindaily-admin-aggressive]
enabled = true
port = http,https
filter = coindaily-admin
logpath = /var/log/nginx/jet.coindaily.online.access.log
maxretry = 1
findtime = 3600
bantime = 604800
action = iptables-multiport[name=coindaily-admin-aggressive, port="http,https"]
