# CoinDaily Platform - IP Whitelist Configuration
# =============================================================================
# This file contains the IP whitelist for the Super Admin portal
# (jet.coindaily.online)
#
# ⚠️ SECURITY CRITICAL ⚠️
# - Only add IPs you absolutely trust
# - Use VPN for dynamic IPs
# - Regularly audit this list
# - Remove development IPs before production deployment
# =============================================================================

# Format: IP_ADDRESS 1; (1 = allowed)

geo $admin_allowed {
    default         0;  # Block all by default
    
    # ==========================================================================
    # CEO IP ADDRESSES
    # ==========================================================================
    # Format: IP_ADDRESS 1; # Description
    
    # CEO Home Network
    # 123.45.67.89    1;  # CEO - Home (City, Country)
    
    # CEO Office
    # 98.76.54.32     1;  # CEO - Office (Address)
    
    # CEO Mobile/Travel
    # 111.222.33.44   1;  # CEO - Mobile Hotspot
    
    # ==========================================================================
    # STAFF IP ADDRESSES
    # ==========================================================================
    
    # Staff Member 1
    # 10.20.30.40     1;  # John Doe - Remote
    
    # Staff Member 2
    # 50.60.70.80     1;  # Jane Smith - Office
    
    # Staff Member 3
    # 90.100.110.120  1;  # Alex Johnson - Home
    
    # ==========================================================================
    # VPN / OFFICE NETWORK (RECOMMENDED)
    # ==========================================================================
    # Using a VPN is the most secure option for dynamic IPs
    
    # WireGuard VPN Network
    # 10.8.0.0/24     1;  # WireGuard VPN Range
    
    # OpenVPN Network  
    # 10.10.0.0/24    1;  # OpenVPN Range
    
    # Office Network (if static IP)
    # 203.0.113.0/24  1;  # Office Building IP Range
    
    # ==========================================================================
    # DEVELOPMENT/STAGING (REMOVE IN PRODUCTION!)
    # ==========================================================================
    127.0.0.1       1;  # Localhost IPv4
    ::1             1;  # Localhost IPv6
    
    # Staging Server (if needed)
    # 192.168.1.100  1;  # Staging Server
}

# =============================================================================
# CEO-ONLY IP WHITELIST
# =============================================================================
# Even stricter - only CEO can access /admin/CEO, /admin/funds, /admin/contracts

geo $ceo_allowed {
    default         0;
    
    # CEO IPs only - copy from above
    # 123.45.67.89   1;  # CEO Home
    # 98.76.54.32    1;  # CEO Office
    
    # Development
    127.0.0.1       1;
    ::1             1;
}

# =============================================================================
# USAGE INSTRUCTIONS
# =============================================================================
# 1. Add your IPs to the appropriate section above
# 2. Remove the # comment to enable each IP
# 3. Include this file in your nginx.conf:
#    include /etc/nginx/conf.d/ip-whitelist.conf;
# 4. Test configuration: sudo nginx -t
# 5. Reload nginx: sudo systemctl reload nginx
#
# To find your IP:
# - curl ifconfig.me
# - curl icanhazip.com
# - curl ipinfo.io/ip
#
# For VPN Setup (recommended):
# - See WIREGUARD_VPN_SECURITY_GUIDE.md
# =============================================================================
