# PR & Ad Distribution Network - press.coindaily.online
# Last Updated: 2026-02-07

# =============================================================================
# RATE LIMITING
# =============================================================================
limit_req_zone $binary_remote_addr zone=press_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=press_general:10m rate=60r/s;

# =============================================================================
# UPSTREAM
# =============================================================================
upstream press_frontend {
    server 127.0.0.1:3003;
    keepalive 16;
}

# =============================================================================
# HTTP TO HTTPS REDIRECT
# =============================================================================
server {
    listen 80;
    server_name press.coindaily.online;
    return 301 https://$server_name$request_uri;
}

# =============================================================================
# MAIN HTTPS SERVER
# =============================================================================
server {
    listen 443 ssl http2;
    server_name press.coindaily.online;

    # ==========================================================================
    # SSL CONFIGURATION
    # ==========================================================================
    ssl_certificate /etc/letsencrypt/live/press.coindaily.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/press.coindaily.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:PRESS_SSL:10m;
    ssl_session_timeout 1d;

    # ==========================================================================
    # SECURITY HEADERS
    # ==========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://app.coindaily.online wss://app.coindaily.online; frame-ancestors 'self';" always;

    # ==========================================================================
    # COMPRESSION
    # ==========================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    gzip_comp_level 6;

    # ==========================================================================
    # LOGGING
    # ==========================================================================
    access_log /var/log/nginx/press.coindaily.online.access.log combined;
    error_log /var/log/nginx/press.coindaily.online.error.log warn;

    # ==========================================================================
    # STATIC ASSETS
    # ==========================================================================
    location /_next/static {
        proxy_pass http://press_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /static {
        proxy_pass http://press_frontend;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ==========================================================================
    # PUBLIC LANDING PAGE
    # ==========================================================================
    location = / {
        limit_req zone=press_general burst=20 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # OPERATOR DASHBOARD (AUTHENTICATED)
    # ==========================================================================
    location /dashboard {
        limit_req zone=press_api burst=10 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================================================
    # CAMPAIGN MANAGEMENT
    # ==========================================================================
    location /campaigns {
        limit_req zone=press_api burst=10 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================================================
    # OPERATOR MANAGEMENT
    # ==========================================================================
    location /operators {
        limit_req zone=press_api burst=10 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================================================
    # ANALYTICS
    # ==========================================================================
    location /analytics {
        limit_req zone=press_api burst=10 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # PAYMENTS - ROUTES TO SUPER ADMIN FOR PROCESSING
    # ==========================================================================
    location /payments {
        limit_req zone=press_api burst=5 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Payment-Request "true";
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================================================
    # AUTH PAGES
    # ==========================================================================
    location ~ ^/(login|register|forgot-password) {
        limit_req zone=press_api burst=5 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # API PROXY TO BACKEND
    # ==========================================================================
    # COMMENTED OUT: Let Next.js handle /api requests via route.ts handlers
    # location /api {
    #     limit_req zone=press_api burst=20 nodelay;
    #    
    #     proxy_pass http://127.0.0.1:4000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host app.coindaily.online;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Press-Request "true";
    # }

    # ==========================================================================
    # GENERAL ROUTES
    # ==========================================================================
    location / {
        limit_req zone=press_general burst=20 nodelay;
        
        proxy_pass http://press_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================================================
    # ERROR PAGES
    # ==========================================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/coindaily-press/public;
        internal;
    }
}
