# CFIS (Finance System) - cabfi.xyz
# Public host for the finance-system app (formerly behind jet.coindaily.online).
# CFIS still talks to the news/admin backend at backend.sygn.live and app.sygn.live.
# CORS is handled by Express (finance-system/src/index.ts) — do NOT add CORS headers here.

upstream cfis_app {
    server 127.0.0.1:3007;
    keepalive 16;
}

# Tighter rate limit than the news backend — finance endpoints are sensitive.
limit_req_zone $binary_remote_addr zone=cfis_limit:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=cfis_conn:10m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name cabfi.xyz www.cabfi.xyz;
    return 301 https://cabfi.xyz$request_uri;
}

# Canonicalize www → apex
server {
    listen 443 ssl http2;
    server_name www.cabfi.xyz;

    ssl_certificate /etc/letsencrypt/live/cabfi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cabfi.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://cabfi.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cabfi.xyz;

    # SSL — TLS 1.2+ (finance system)
    ssl_certificate /etc/letsencrypt/live/cabfi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cabfi.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers — strict for financial UI
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://quickchart.io; connect-src 'self' https://backend.sygn.live https://app.sygn.live wss://backend.sygn.live; font-src 'self' data:; frame-ancestors 'none'" always;

    # Rate limiting
    limit_req zone=cfis_limit burst=60 nodelay;
    limit_conn cfis_conn 20;

    # Health check (public — health endpoint is whitelisted from rate-limit
    # by not including a `limit_req` directive at all; nginx 1.18 does not
    # accept `limit_req off`.)
    location = /health {
        proxy_pass http://cfis_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # SENDPRESS HMAC webhooks from press.sygn.live → CFIS
    # CFIS verifies X-Press-Signature / X-HMAC-Signature internally.
    location ~ ^/api/(press-orders|subscriptions|internal|points-bridge) {
        proxy_pass http://cfis_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # All other CFIS API + dashboard (super-admin gated by CFIS)
    location / {
        proxy_pass http://cfis_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # Metrics (internal only)
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://cfis_app;
    }
}
