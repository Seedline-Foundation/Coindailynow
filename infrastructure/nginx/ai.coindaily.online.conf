# AI Services - ai.coindaily.online
upstream ai_orchestrator {
    server 127.0.0.1:4001;
    keepalive 16;
}

upstream nllb_translation {
    server 127.0.0.1:8080;
    keepalive 8;
}

upstream embeddings_service {
    server 127.0.0.1:8081;
    keepalive 8;
}

upstream ollama_service {
    server 127.0.0.1:11434;
    keepalive 8;
}

server {
    listen 80;
    server_name ai.coindaily.online;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.coindaily.online;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/ai.coindaily.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.coindaily.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:AI_SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers (NO CORS headers — Express backend handles CORS)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting for AI services (to prevent abuse)
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=20r/s;
    limit_req zone=ai_limit burst=50 nodelay;

    # Larger timeouts for AI processing
    proxy_read_timeout 300s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;

    # Larger body size for AI requests
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/ai.coindaily.online.access.log combined;
    error_log /var/log/nginx/ai.coindaily.online.error.log warn;

    # Health check (public)
    location /health {
        proxy_pass http://ai_orchestrator/health;
        access_log off;
    }

    # AI Orchestrator API
    location /api/orchestrator {
        proxy_pass http://ai_orchestrator;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Translation Service
    location /api/translate {
        proxy_pass http://nllb_translation/translate;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/translate/batch {
        proxy_pass http://nllb_translation/translate/batch;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/languages {
        proxy_pass http://nllb_translation/languages;
        proxy_http_version 1.1;
        access_log off;
    }

    # Embeddings Service
    location /api/embeddings {
        proxy_pass http://embeddings_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LLM Service (Ollama) - Internal only
    location /api/llm {
        # Restrict to internal services only
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
        
        proxy_pass http://ollama_service/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Content Generation
    location /api/generate {
        proxy_pass http://ai_orchestrator/generate;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Longer timeout for content generation
        proxy_read_timeout 600s;
    }

    # Market Analysis
    location /api/market {
        proxy_pass http://ai_orchestrator/market;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Sentiment Analysis
    location /api/sentiment {
        proxy_pass http://ai_orchestrator/sentiment;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API Documentation
    location /docs {
        proxy_pass http://ai_orchestrator/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Service status endpoints
    location /status {
        proxy_pass http://ai_orchestrator/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        return 404 '{"error": "Not Found", "message": "Use /api/* endpoints"}';
        add_header Content-Type application/json;
    }
}
