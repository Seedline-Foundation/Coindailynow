# Super Admin Portal - jet.coindaily.online
# ⚠️ HIGHLY SECURED - IP WHITELIST ONLY ⚠️

# Whitelisted IPs - ADD YOUR IPs HERE
geo $allowed_ip {
    default         0;
    # CEO IP addresses
    # 123.45.67.89   1;  # CEO Home
    # 98.76.54.32    1;  # CEO Office
    
    # Staff IP addresses
    # 111.222.333.44 1;  # Staff 1
    # 222.333.444.55 1;  # Staff 2
    
    # Office VPN
    # 10.10.0.0/24   1;  # Office VPN Range
    
    # Development (REMOVE IN PRODUCTION)
    127.0.0.1       1;  # Localhost
    # ADD YOUR IPs BELOW:
}

# Rate limiting for admin
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=admin_conn:10m;

upstream admin_frontend {
    server 127.0.0.1:3002;
    keepalive 8;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name jet.coindaily.online;
    
    # Block non-whitelisted IPs even on HTTP
    if ($allowed_ip = 0) {
        return 444;  # Connection closed without response
    }
    
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jet.coindaily.online;

    # ===== IP WHITELIST CHECK =====
    # Block all non-whitelisted IPs immediately
    if ($allowed_ip = 0) {
        return 444;  # Connection closed without response - no info leaked
    }

    # SSL Configuration - TLS 1.3 ONLY for maximum security
    ssl_certificate /etc/letsencrypt/live/jet.coindaily.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jet.coindaily.online/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:ADMIN_SSL:10m;
    ssl_session_timeout 5m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Maximum Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://app.coindaily.online; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Rate limiting
    limit_req zone=admin_limit burst=5 nodelay;
    limit_conn admin_conn 5;

    # Request size limits
    client_max_body_size 10M;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Logging - Log EVERYTHING for security audit
    access_log /var/log/nginx/jet.coindaily.online.access.log combined;
    error_log /var/log/nginx/jet.coindaily.online.error.log warn;

    # Block common attack patterns
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|\.pl)$ {
        return 444;
    }

    # Block hidden files
    location ~ /\. {
        return 444;
    }

    # Staff Landing Page (post-logout view)
    location = / {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Admin-Access "true";
    }

    # Staff Admin Portal
    location /admin {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Admin-Access "true";
        proxy_cache_bypass $http_upgrade;
        
        # Additional security for admin routes
        proxy_hide_header X-Powered-By;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # CEO Portal - Extra restrictions
    location /admin/CEO {
        # Could add additional IP check for CEO-only IPs here
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-CEO-Access "true";
        proxy_cache_bypass $http_upgrade;
        
        # Strictest rate limit for CEO portal
        limit_req zone=admin_limit burst=2 nodelay;
    }

    # Static assets
    location /_next/static {
        proxy_pass http://admin_frontend;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "private, max-age=86400";
    }

    # API calls to backend (direct internal proxy)
    # COMMENTED OUT: Let Next.js handle /api requests via route.ts handlers
    # location /api {
    #    proxy_pass http://127.0.0.1:4000;
    #    proxy_http_version 1.1;
    #    proxy_set_header Host app.coindaily.online;
    #    proxy_set_header X-Real-IP $remote_addr;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto $scheme;
    #    proxy_set_header X-Admin-Request "true";
    # }

    # Smart Contracts Management - CEO ONLY
    location /admin/contracts {
        # Smart contract deployment and management
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Contract-Admin "true";
        proxy_cache_bypass $http_upgrade;
        
        # Strictest rate limit for contract operations
        limit_req zone=admin_limit burst=2 nodelay;
        
        # Extended timeout for contract deployments
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # Funds Management - CEO ONLY
    location /admin/funds {
        proxy_pass http://admin_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Funds-Admin "true";
        proxy_cache_bypass $http_upgrade;
        
        # Very strict rate limit for funds operations
        limit_req zone=admin_limit burst=1 nodelay;
    }

    # Block everything else
    location / {
        return 444;
    }
}
