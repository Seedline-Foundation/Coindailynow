# CoinDaily Admin — jet.coindaily.online
# SSL terminated by Cloudflare (Full Strict mode)

server {
    listen 80;
    server_name jet.coindaily.online;

    # Security: deny all except Cloudflare + whitelisted IPs (optional)
    # Uncomment and add your IP to restrict access:
    # allow 173.245.48.0/20;  # Cloudflare
    # allow 103.21.244.0/22;  # Cloudflare
    # allow 103.22.200.0/22;  # Cloudflare
    # allow YOUR.IP.HERE;
    # deny all;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
